<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cronómetro E3/E4</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
    body{font-family:system-ui,Arial,sans-serif;background:#111;color:#f3f3f3;text-align:center;margin:0;padding:20px}
    h1{margin-top:0;font-size:1.6rem}
    .controls{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:20px}
    label{display:flex;flex-direction:column;font-size:.9rem}
    input{padding:6px;border-radius:4px;border:1px solid #555;background:#222;color:#f3f3f3;width:90px;text-align:center}
    button{padding:10px 20px;border:none;border-radius:4px;background:#00c37a;color:#111;font-weight:600;font-size:1rem;cursor:pointer}
    button:disabled{background:#555;color:#999}
    #display{font-size:4rem;margin:20px 0 10px}
    #status{font-size:1.3rem;margin-bottom:20px}
</style>
</head>
<body>
    <h1>Cronómetro AMRAP / E3-E4</h1>

    <div class="controls">
        <label>Minutos trabajo
            <input id="workMin" type="number" min="1" value="3">
        </label>
        <label>Segundos descanso
            <input id="restSec" type="number" min="5" value="60">
        </label>
        <label>Bloques totales
            <input id="blocks" type="number" min="1" value="6">
        </label>
    </div>

    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>

    <div id="display">00:00</div>
    <div id="status">Preparado</div>

<script>
(() => {
    const display = document.getElementById('display');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    let timer, endTime, phase = 'idle', block = 0;

    // Beep generator (simple 440 Hz ping)
    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.value = 0.15;
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
    }

    function format(ms) {
        const totalSec = Math.ceil(ms / 1000);
        const m = String(Math.floor(totalSec / 60)).padStart(2,'0');
        const s = String(totalSec % 60).padStart(2,'0');
        return `${m}:${s}`;
    }

    function tick() {
        const now = Date.now();
        const remaining = endTime - now;
        if (remaining <= 0) {
            advancePhase();
            return;
        }
        display.textContent = format(remaining);
        // Beep 3-2-1 segundos antes de cambio
        if (remaining <= 4000 && remaining >= 3500) beep();
        timer = requestAnimationFrame(tick);
    }

    function advancePhase() {
        cancelAnimationFrame(timer);
        if (phase === 'work') {
            phase = 'rest';
            statusEl.textContent = `Descanso ▶ Bloque ${block}/${totalBlocks}`;
            endTime = Date.now() + restSec * 1000;
            beep();
            tick();
        } else {
            // fin del descanso o inicio
            block++;
            if (block > totalBlocks) {
                statusEl.textContent = '¡FIN! 🏆';
                display.textContent = '00:00';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                beep(); beep(); // doble beep final
                phase = 'idle';
                return;
            }
            phase = 'work';
            statusEl.textContent = `Trabajo 🔥 Bloque ${block}/${totalBlocks}`;
            endTime = Date.now() + workMin * 60 * 1000;
            beep();
            tick();
        }
    }

    let workMin, restSec, totalBlocks;

    startBtn.onclick = () => {
        workMin     = Number(document.getElementById('workMin').value);
        restSec     = Number(document.getElementById('restSec').value);
        totalBlocks = Number(document.getElementById('blocks').value);
        if (workMin<1 || restSec<5 || totalBlocks<1) return alert('Revisa los valores 😉');
        startBtn.disabled = true;
        stopBtn.disabled  = false;
        block = 0;
        phase = 'rest'; // arranca con cuenta atrás 5 s de cortesía
        restSec = 5;
        advancePhase();
    };

    stopBtn.onclick = () => {
        cancelAnimationFrame(timer);
        startBtn.disabled = false;
        stopBtn.disabled  = true;
        statusEl.textContent = 'Detenido';
        display.textContent = '00:00';
        phase = 'idle';
    };
})();
</script>
</body>
</html>
